[defaults]
inventory = inventory/hosts.ini
roles_path = roles
host_key_checking = False
retry_files_enabled = False
# Иначе на части хостов (ACL/особый chmod) падает become_user: postgres в community.postgresql
allow_world_readable_tmpfiles = True

[ssh_connection]
# С паролем/paramiko pipelining заставляет Ansible идти через OpenSSH с PasswordAuthentication=no.
pipelining = False
